name: Publish Skill to npm

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "chore: bump version [skip ci]"
          git push

      - name: Build skill package
        run: |
          mkdir -p dist/skills/fast-stack
          cp *.md dist/skills/fast-stack/
          node -e "
            const pkg = require('./package.json');
            const skill = {
              name: pkg.name,
              version: pkg.version,
              description: pkg.description,
              keywords: pkg.keywords,
              files: ['skills'],
              main: 'skills/fast-stack/readme.md',
              license: pkg.license,
              publishConfig: { access: 'public' }
            };
            require('fs').writeFileSync('dist/package.json', JSON.stringify(skill, null, 2));
          "

      - name: Publish to npm
        run: npm publish dist/ --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
